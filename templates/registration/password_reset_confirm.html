<!DOCTYPE html>
<html>
<head>
    <title>Новый пароль</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #6c5ce7; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Установите новый пароль</h2>
    
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Сохранить пароль</button>
        </form>
    {% else %}
        <p class="error">❌ Ссылка недействительна или устарела.</p>
        <p><a href="{% url 'password_reset' %}">Запросить сброс пароля заново</a></p>
    {% endif %}
</body>
</html>
