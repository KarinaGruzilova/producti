{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успешна — Producti</title>
    <link rel="stylesheet" href="{% static 'styles/index.css' %}">
    <link rel="stylesheet" href="{% static 'styles/payment.css' %}">
</head>
<body data-user-authenticated="true">
    <main>
        <img src="{% static 'images/fon-proversion.png' %}" class="hero_bg" alt="">

        <header class="header">
            <a href="{% url 'main:index' %}" class="logo">
                <svg width="12" height="17" viewBox="0 0 12 17" fill="none">
                    <path d="M3.24995 16.5H8.74986M5.9999 0.5C2.96239 0.5 0.5 2.88781 0.5 5.83333C0.5 6.91289 0.830767 7.91753 1.39939 8.75715C2.27379 10.0483 2.7106 10.6934 2.76735 10.7899C3.27221 11.6476 3.17925 11.3451 3.24279 12.3307C3.24993 12.4415 3.24995 12.6092 3.24995 12.9444C3.24995 13.4354 3.66035 13.8333 4.1666 13.8333L7.83321 13.8333C8.33946 13.8333 8.74986 13.4354 8.74986 12.9444C8.74986 12.6092 8.74986 12.4415 8.757 12.3307C8.82053 11.3451 8.72704 11.6476 9.2319 10.7899C9.28865 10.6934 9.72621 10.0483 10.6006 8.75715C11.1692 7.91753 11.5 6.91289 11.5 5.83333C11.5 2.88781 9.03742 0.5 5.9999 0.5Z" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Producti</span>
            </a>
            <nav class="nav">
                <a href="{% url 'main:proversion' %}" class="nav__link">Тарифы</a>
                <a href="{% url 'users:profile' %}" class="nav__link">Мой профиль</a>
                <a href="{% url 'users:logout' %}" class="nav__link">Выйти</a>
            </nav>
        </header>

        <div class="success-container">
            <div class="success-card">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>

                <h1 class="success-title">Оплата прошла успешно!</h1>
                <p class="success-subtitle">Ваш промокод для активации Pro:</p>

                <div class="promo-box">
                    <span class="promo-code" id="promoCode">{{ promo_code }}</span>
                    <button onclick="copyCode()" class="copy-btn">Скопировать</button>
                </div>

                <div class="warning-note">
                    <p>Промокод действителен 24 часа. Только для вашего аккаунта.</p>
                </div>

                <a href="{% url 'users:profile' %}" class="btn-profile">Активировать в профиле →</a>
            </div>
        </div>
    </main>

    <div class="messages-container" id="messagesContainer"></div>

    <script src="{% static 'js/payment.js' %}"></script>
</body>
</html>
